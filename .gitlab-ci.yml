workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - when: never

stages:
  - build
  - test

build-job:
  stage: build
  image:
    name: maven:3.9.9-eclipse-temurin-21
    pull_policy: if-not-present
  script:
    - mvn -version
    - ./mvnw clean package || mvn clean package
  artifacts:
    name: app-jar 
    paths:
      - ./target/*.jar

sast_semgrep:
  stage: test
  image: semgrep/semgrep:latest
  script:
    - semgrep scan --config auto --text --text-output=semgrep.txt --json-output=semgrep.json --sarif-output=semgrep.sarif .
  artifacts:
    when: always
    paths:
      - semgrep.txt
      - semgrep.json
      - semgrep.sarif
    reports:
      sast:
        paths:
          - semgrep.sarif