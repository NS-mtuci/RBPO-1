workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
    - when: never

stages:
  - security
  - build
  - test
  - container

secret-scan:
  stage: security

  image:
    name: ghcr.io/gitleaks/gitleaks:latest
    entrypoint: [""]

  script:
    - gitleaks dir --verbose --redact --exit-code 1 .

  allow_failure: false

build-job:
  stage: build

  needs:
    - secret-scan

  image: maven:3.9.9-eclipse-temurin-21

  script:
    - |
      if [ -f ./mvnw ]; then
        chmod +x ./mvnw
        ./mvnw clean package
      else
        mvn clean package
      fi

  artifacts:
    name: app-jar
    paths:
      - ./target/*.jar

sast_semgrep:
  stage: test

  image: semgrep/semgrep:latest

  script:
    - semgrep scan --config auto --text --text-output=semgrep.txt --json-output=semgrep.json --sarif-output=semgrep.sarif .

  artifacts:
    when: always
    paths:
      - semgrep.txt
      - semgrep.json
      - semgrep.sarif
    reports:
      sast:
        paths:
          - semgrep.sarif

sca_dependency_check:
  stage: test

  image: maven:3.9.9-eclipse-temurin-21

  dependencies:
    - build-job

  script:
    - mvn -version
    - chmod +x mvnw || true
    - ./mvnw -B -DossindexAnalyzerEnabled=false org.owasp:dependency-check-maven:check || mvn -B -DossindexAnalyzerEnabled=false org.owasp:dependency-check-maven:check

  artifacts:
    when: always
    name: dependency-check-report
    paths:
      - ./target/dependency-check/dependency-check-report.html

dast_zap_baseline:
  stage: test

  image:
    name: zaproxy/zap-stable
    entrypoint: [""]

  dependencies:
    - build-job

  script:
    - |
      mkdir -p zap-reports/baseline
      APP_JAR=$(ls ./target/*.jar | grep -v original | head -n 1)
      test -n "$APP_JAR"
      echo "Starting application from $APP_JAR"
      java -jar "$APP_JAR" > app-baseline.log 2>&1 &
      sleep 30
      zap-baseline.py \
        -t http://127.0.0.1:8080 \
        -c zap/zap-rules.tsv \
        -r zap-reports/baseline/zap-baseline.html \
        -J zap-reports/baseline/zap-baseline.json \
        -w zap-reports/baseline/zap-baseline.md \
        -I || true

  artifacts:
    when: always
    name: zap-baseline-report
    paths:
      - zap-reports/baseline/
      - app-baseline.log

dast_zap_api_scan:
  stage: test

  image:
    name: zaproxy/zap-stable
    entrypoint: [""]

  dependencies:
    - build-job

  script:
    - |
      mkdir -p zap-reports/api
      APP_JAR=$(ls ./target/*.jar | grep -v original | head -n 1)
      test -n "$APP_JAR"
      echo "Starting application from $APP_JAR"
      java -jar "$APP_JAR" > app-api.log 2>&1 &
      sleep 30
      zap-api-scan.py \
        -t zap/openapi.yaml \
        -f openapi \
        -c zap/zap-rules.tsv \
        -r zap-reports/api/zap-api.html \
        -J zap-reports/api/zap-api.json \
        -w zap-reports/api/zap-api.md \
        -I || true

  artifacts:
    when: always
    name: zap-api-report
    paths:
      - zap-reports/api/
      - app-api.log

web_fuzzing:
  stage: test

  image: maven:3.9.9-eclipse-temurin-21

  dependencies:
    - build-job

  before_script:
    - apt-get update
    - apt-get install -y curl golang-go
    - go install github.com/ffuf/ffuf/v2@latest
    - export PATH="$PATH:$(go env GOPATH)/bin"
    - java -version
    - ffuf -V

  script:
    - |
      mkdir -p fuzzing fuzzing-reports

      cat > fuzzing/wordlist.txt <<'EOF'
      api
      login
      logout
      register
      users
      user
      admin
      actuator
      health
      error
      swagger-ui
      v3
      docs
      config
      test
      debug
      EOF

      APP_JAR=$(ls ./target/*.jar | grep -v original | head -n 1)
      test -n "$APP_JAR"

      echo "Starting application from $APP_JAR"
      java -jar "$APP_JAR" > app-fuzzing.log 2>&1 &

      for i in $(seq 1 30); do
        if curl -s http://127.0.0.1:8080 > /dev/null; then
          echo "Application is available"
          break
        fi

        echo "Waiting for application..."
        sleep 2
      done

      ffuf \
        -u http://127.0.0.1:8080/FUZZ \
        -w fuzzing/wordlist.txt \
        -of json \
        -o fuzzing-reports/ffuf-report.json \
        -mc all \
        -fc 404

  artifacts:
    when: always
    name: ffuf-fuzzing-report
    paths:
      - fuzzing-reports/
      - app-fuzzing.log

container_image_trivy:
  stage: container

  image: docker:27.5.1

  services:
    - name: docker:27.5.1-dind
      alias: docker
      command: ["--tls=false"]

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2

  dependencies:
    - build-job

  before_script:
    - apk add --no-cache curl tar gzip
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - trivy --version
    - docker version

  script:
    - |
      IMAGE_TAG="${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      IMAGE_LATEST="${CI_REGISTRY_IMAGE}:latest"

      echo "Using image tag: $IMAGE_TAG"

      ls -la target
      docker build -t "$IMAGE_TAG" .
      docker save "$IMAGE_TAG" -o app-image.tar

      mkdir -p trivy-reports

      set +e

      trivy config Dockerfile \
        --exit-code 1 \
        --severity HIGH,CRITICAL \
        --format table \
        --output trivy-reports/trivy-dockerfile.txt
      CONFIG_STATUS=$?

      trivy image \
        --input app-image.tar \
        --exit-code 1 \
        --severity HIGH,CRITICAL \
        --ignore-unfixed \
        --format table \
        --output trivy-reports/trivy-image.txt
      IMAGE_STATUS=$?

      set -e

      cat trivy-reports/trivy-dockerfile.txt || true
      cat trivy-reports/trivy-image.txt || true

      if [ "$CONFIG_STATUS" -ne 0 ] || [ "$IMAGE_STATUS" -ne 0 ]; then
        echo "Trivy found HIGH/CRITICAL vulnerabilities or Dockerfile misconfigurations."
        echo "Image publishing is blocked."
        exit 1
      fi

      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
        docker push "$IMAGE_TAG"
        docker tag "$IMAGE_TAG" "$IMAGE_LATEST"
        docker push "$IMAGE_LATEST"
      else
        echo "Merge request pipeline: scan passed, image publishing skipped."
      fi

  artifacts:
    when: always
    name: trivy-container-security-reports
    paths:
      - trivy-reports/