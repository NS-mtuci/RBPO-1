name: Build Maven Project

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: maven:3.9.9-eclipse-temurin-21

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Give execute permission to mvnw
        run: |
          if [ -f ./mvnw ]; then
            chmod +x ./mvnw
          fi

      - name: Build, test and package
        run: |
          if [ -f ./mvnw ]; then
            ./mvnw clean package
          else
            mvn clean package
          fi

      - name: Upload jar artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: app-jar
          path: ./target/*.jar
          if-no-files-found: warn

  sast:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --text \
            --text-output=semgrep.txt \
            --json-output=semgrep.json \
            --sarif-output=semgrep.sarif \
            .

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: semgrep-reports
          path: |
            semgrep.txt
            semgrep.json
            semgrep.sarif
          if-no-files-found: error

  sca:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: maven:3.9.9-eclipse-temurin-21

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Give execute permission to mvnw
        run: |
          if [ -f ./mvnw ]; then
            chmod +x ./mvnw
          fi

      - name: Run OWASP Dependency-Check
        run: |
          if [ -f ./mvnw ]; then
            ./mvnw -B -DossindexAnalyzerEnabled=false org.owasp:dependency-check-maven:check
          else
            mvn -B -DossindexAnalyzerEnabled=false org.owasp:dependency-check-maven:check
          fi

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: dependency-check-report
          path: target/dependency-check/dependency-check-report.html
          if-no-files-found: error