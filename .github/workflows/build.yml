name: Build Maven Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  actions: read
  security-events: write
  packages: write

jobs:
  secret_scan:
    name: Secret scan with Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Gitleaks secret scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            dir --verbose --redact --exit-code 1 /repo
  build:
    needs: secret_scan
    runs-on: ubuntu-latest
    container:
      image: maven:3.9.9-eclipse-temurin-21

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Give execute permission to mvnw
        run: |
          if [ -f ./mvnw ]; then
            chmod +x ./mvnw
          fi

      - name: Build, test and package
        run: |
          if [ -f ./mvnw ]; then
            ./mvnw clean package
          else
            mvn clean package
          fi

      - name: Upload jar artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: app-jar
          path: ./target/*.jar
          if-no-files-found: warn

  sast:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --text \
            --text-output=semgrep.txt \
            --json-output=semgrep.json \
            --sarif-output=semgrep.sarif \
            .

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: semgrep-reports
          path: |
            semgrep.txt
            semgrep.json
            semgrep.sarif
          if-no-files-found: error

  sca:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: maven:3.9.9-eclipse-temurin-21

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Give execute permission to mvnw
        run: |
          if [ -f ./mvnw ]; then
            chmod +x ./mvnw
          fi

      - name: Run OWASP Dependency-Check
        run: |
          if [ -f ./mvnw ]; then
            ./mvnw -B -DossindexAnalyzerEnabled=false org.owasp:dependency-check-maven:check
          else
            mvn -B -DossindexAnalyzerEnabled=false org.owasp:dependency-check-maven:check
          fi

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: dependency-check-report
          path: target/dependency-check/dependency-check-report.html
          if-no-files-found: error

  dast_zap_baseline:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download jar artifact
        uses: actions/download-artifact@v5
        with:
          name: app-jar
          path: target

      - name: Prepare ZAP rules file
        run: |
          mkdir -p zap
          touch zap/zap-rules.tsv

      - name: Start application
        run: |
          APP_JAR=$(ls target/*.jar | grep -v original | head -n 1)
          echo "Starting application from $APP_JAR"
          nohup java -jar "$APP_JAR" > app-baseline.log 2>&1 &
          sleep 30

      - name: ZAP Baseline Scan
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: "http://127.0.0.1:8080"
          rules_file_name: "zap/zap-rules.tsv"
          fail_action: false
          allow_issue_writing: false
          cmd_options: "-I"

      - name: Collect ZAP baseline reports
        if: always()
        run: |
          mkdir -p zap-reports/baseline
          cp -f zap-baseline.html zap-reports/baseline/zap-baseline.html || true
          cp -f zap-baseline.json zap-reports/baseline/zap-baseline.json || true
          cp -f zap-baseline.md zap-reports/baseline/zap-baseline.md || true
          cp -f report_html.html zap-reports/baseline/report_html.html || true
          cp -f report_json.json zap-reports/baseline/report_json.json || true
          cp -f report_md.md zap-reports/baseline/report_md.md || true
          cp -f app-baseline.log zap-reports/baseline/app-baseline.log || true

      - name: Upload ZAP baseline reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: zap-baseline-report
          path: zap-reports/baseline/
          if-no-files-found: warn

  dast_zap_api_scan:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download jar artifact
        uses: actions/download-artifact@v5
        with:
          name: app-jar
          path: target

      - name: Prepare ZAP rules file
        run: |
          mkdir -p zap
          touch zap/zap-rules.tsv

      - name: Start application
        run: |
          APP_JAR=$(ls target/*.jar | grep -v original | head -n 1)
          echo "Starting application from $APP_JAR"
          nohup java -jar "$APP_JAR" > app-api.log 2>&1 &
          sleep 30

      - name: ZAP API Scan
        continue-on-error: true
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: "/zap/wrk/zap/openapi.yaml"
          format: openapi
          rules_file_name: "zap/zap-rules.tsv"
          fail_action: false
          allow_issue_writing: false
          cmd_options: "-I"

      - name: Collect ZAP API reports
        if: always()
        run: |
          mkdir -p zap-reports/api
          cp -f zap-api.html zap-reports/api/zap-api.html || true
          cp -f zap-api.json zap-reports/api/zap-api.json || true
          cp -f zap-api.md zap-reports/api/zap-api.md || true
          cp -f report_html.html zap-reports/api/report_html.html || true
          cp -f report_json.json zap-reports/api/report_json.json || true
          cp -f report_md.md zap-reports/api/report_md.md || true
          cp -f app-api.log zap-reports/api/app-api.log || true

      - name: Upload ZAP API reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: zap-api-report
          path: zap-reports/api/
          if-no-files-found: warn
          
  web_fuzzing:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download jar artifact
        uses: actions/download-artifact@v5
        with:
          name: app-jar
          path: target

      - name: Install ffuf
        run: |
          sudo apt-get update
          sudo apt-get install -y ffuf

      - name: Prepare fuzzing wordlist
        run: |
          mkdir -p fuzzing
          cat > fuzzing/wordlist.txt <<'EOF'
          api
          login
          logout
          register
          users
          user
          admin
          actuator
          health
          error
          swagger-ui
          v3
          docs
          config
          test
          debug
          EOF

      - name: Start application
        run: |
          APP_JAR=$(ls target/*.jar | grep -v original | head -n 1)
          echo "Starting application from $APP_JAR"
          nohup java -jar "$APP_JAR" > app-fuzzing.log 2>&1 &
          sleep 30

      - name: Run ffuf web fuzzing
        run: |
          mkdir -p fuzzing-reports
          ffuf \
            -u http://127.0.0.1:8080/FUZZ \
            -w fuzzing/wordlist.txt \
            -of json \
            -o fuzzing-reports/ffuf-report.json \
            -mc all \
            -fc 404

      - name: Upload fuzzing reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ffuf-fuzzing-report
          path: |
            fuzzing-reports/
            app-fuzzing.log
          if-no-files-found: warn

  container_security_scan:
    name: Build, scan and publish Docker image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download jar artifact
        uses: actions/download-artifact@v5
        with:
          name: app-jar
          path: target

      - name: Prepare image tags
        run: |
          REPOSITORY_LC="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_REF=ghcr.io/${REPOSITORY_LC}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=ghcr.io/${REPOSITORY_LC}:latest" >> "$GITHUB_ENV"

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Build Docker image locally
        run: |
          ls -la target
          docker build -t "$IMAGE_REF" .
          docker save "$IMAGE_REF" -o app-image.tar

      - name: Run Trivy security scan before publishing
        run: |
          mkdir -p trivy-reports

          set +e

          trivy config Dockerfile \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --format table \
            --output trivy-reports/trivy-dockerfile.txt
          CONFIG_STATUS=$?

          trivy image \
            --input app-image.tar \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            --output trivy-reports/trivy-image.txt
          IMAGE_STATUS=$?

          set -e

          cat trivy-reports/trivy-dockerfile.txt || true
          cat trivy-reports/trivy-image.txt || true

          if [ "$CONFIG_STATUS" -ne 0 ] || [ "$IMAGE_STATUS" -ne 0 ]; then
            echo "Trivy found HIGH/CRITICAL vulnerabilities or Dockerfile misconfigurations."
            echo "Image publishing is blocked."
            exit 1
          fi

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: trivy-container-security-reports
          path: trivy-reports/
          if-no-files-found: warn

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish Docker image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "$IMAGE_REF"
          docker tag "$IMAGE_REF" "$IMAGE_LATEST"
          docker push "$IMAGE_LATEST"